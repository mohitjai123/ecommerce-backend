name: 🚀 Ecommerce Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: 📥 Pull latest code
        run: |
          cd /home/runneruser/ecommerce-backend
          git pull origin main

      - name: 🔄 Install deps & restart app
        run: |
          npm install
          pm2 restart ecosystem.config.js || pm2 start npm --name "ecommerce-backend" -- start
